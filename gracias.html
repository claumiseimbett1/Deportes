<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Mensaje enviado | Festi-Torneo Regional del Sinú</title>
    <style>
        :root {
            --primary-color: #0b1039;
            --secondary-color: #00f0ff;
            --text-gray: #a5a5a5;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: #f0f6ff;
            color: var(--primary-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .page-header {
            background: #ffffff;
            box-shadow: 0 5px 25px rgba(11, 16, 57, 0.08);
            padding: 18px 24px;
        }

        .page-header .container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-header img {
            height: 42px;
            width: auto;
        }

        .page-header span {
            font-weight: 700;
            color: var(--primary-color);
        }

        main {
            flex: 1;
            display: grid;
            place-items: center;
            padding: 60px 20px;
        }

        .card {
            max-width: 560px;
            width: 100%;
            text-align: center;
            background: #ffffff;
            border-radius: 20px;
            padding: 40px 28px;
            border: 1px solid #e8eef8;
            box-shadow: 0 16px 30px rgba(11, 16, 57, 0.08);
        }

        .eyebrow {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            color: var(--secondary-color);
            font-weight: 700;
            margin-bottom: 14px;
        }

        h1 {
            font-size: clamp(1.6rem, 4vw, 2rem);
            margin-bottom: 16px;
        }

        p {
            color: var(--text-gray);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 28px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 22px;
            border-radius: 999px;
            border: 1px solid transparent;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
            font-size: 1rem;
        }

        .btn.whatsapp {
            background: #25d366;
            color: #ffffff;
        }

        .btn.ghost {
            border-color: #e8eef8;
            color: var(--primary-color);
            background: #ffffff;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(11, 16, 57, 0.12);
        }

        footer {
            text-align: center;
            padding: 24px 20px;
            color: var(--text-gray);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header class="page-header">
        <div class="container">
            <img src="img/logoTop4Race.png" alt="Top4Race">
            <span>Festi-Torneo Regional del Sinú</span>
        </div>
    </header>

    <main>
        <div class="card">
            <p class="eyebrow">Contacto</p>
            <h1>¡Listo! Mensaje enviado</h1>
            <p>Te respondemos en <strong>menos de 24 horas</strong> al correo o WhatsApp que nos dejaste.</p>
            <div class="actions">
                <a class="btn whatsapp" href="https://wa.me/573043499052" target="_blank" rel="noopener">Escribir por WhatsApp</a>
                <a class="btn ghost" href="/">Volver al evento</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Top4Race · Club Deportivo AquaTEN — Festi-Torneo Regional del Sinú</p>
    </footer>
</body>
</html>
